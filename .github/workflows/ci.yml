name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend-tests:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: ci_test_jwt_secret_12345678901234567890
      ADMIN_SESSION_SECRET: ci_test_admin_secret_12345678901234567890
      RUN_BACKEND_INTEGRATION: "0"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
