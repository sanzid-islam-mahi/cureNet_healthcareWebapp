services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-curenet}
      MYSQL_USER: ${DB_USER:-curenet}
      MYSQL_PASSWORD: ${DB_PASSWORD:-curenet_dev_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_dev_password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-root_dev_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-curenet}
      DB_USER: ${DB_USER:-curenet}
      DB_PASSWORD: ${DB_PASSWORD:-curenet_dev_password}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-curenet_auth}
      AUTH_COOKIE_MAX_AGE_MS: ${AUTH_COOKIE_MAX_AGE_MS:-604800000}
      AUTH_ALLOW_UNVERIFIED_LOGIN: ${AUTH_ALLOW_UNVERIFIED_LOGIN:-false}
      APP_BASE_URL: ${APP_BASE_URL:-https://localhost}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://localhost}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      UPLOADS_DIR: /app/uploads
      MAIL_HOST: ${MAIL_HOST:-127.0.0.1}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_SECURE: ${MAIL_SECURE:-false}
      MAIL_FROM: ${MAIL_FROM:-CureNet <no-reply@curenet.local>}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      REMINDER_WORKER_POLL_MS: ${REMINDER_WORKER_POLL_MS:-60000}
      REMINDER_WORKER_BATCH_SIZE: ${REMINDER_WORKER_BATCH_SIZE:-25}
      REMINDER_MISSED_GRACE_MINUTES: ${REMINDER_MISSED_GRACE_MINUTES:-120}
      REMINDER_REPLENISH_HORIZON_DAYS: ${REMINDER_REPLENISH_HORIZON_DAYS:-7}
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  reminder-worker:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: ["npm", "run", "reminder-worker"]
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-curenet}
      DB_USER: ${DB_USER:-curenet}
      DB_PASSWORD: ${DB_PASSWORD:-curenet_dev_password}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-https://localhost}
      UPLOADS_DIR: /app/uploads
      MAIL_HOST: ${MAIL_HOST:-127.0.0.1}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_SECURE: ${MAIL_SECURE:-false}
      MAIL_FROM: ${MAIL_FROM:-CureNet <no-reply@curenet.local>}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      REMINDER_WORKER_POLL_MS: ${REMINDER_WORKER_POLL_MS:-60000}
      REMINDER_WORKER_BATCH_SIZE: ${REMINDER_WORKER_BATCH_SIZE:-25}
      REMINDER_MISSED_GRACE_MINUTES: ${REMINDER_MISSED_GRACE_MINUTES:-120}
      REMINDER_REPLENISH_HORIZON_DAYS: ${REMINDER_REPLENISH_HORIZON_DAYS:-7}
    volumes:
      - uploads-data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://127.0.0.1/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  mysql-data:
  uploads-data:
